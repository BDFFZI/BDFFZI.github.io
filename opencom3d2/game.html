<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>COM3D2游戏</title>
    <link rel="icon" href="images/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="styles/ui.css">
</head>

<body>
    <h2>如何获取最新的本体和DLC?</h2>
    <ol>
        <li>
            <p>先通过以下网站找到合适的种子或磁链</p>
            <ul>
                <li><a href="https://ggbases.dlgal.com/" target="_blank">GGBases</a>（国内可用）</li>
                <li><a href="https://sukebei.nyaa.si/">Sukebei</a></li>
            </ul>
            <p class="hint">建议下COM3D2而不是COM3D2.5，因为有些插件不兼容新版本。</p>
        </li>
        <li>
            <p>再使用p2p下载软件进行下载，比如：</p>
            <ul>
                <li>百度网盘</li>
                <li>迅雷</li>
                <li><a href="https://github.com/qbittorrent/qBittorrent"
                        target="_blank">qbittorrent</a>（推荐，开源软件，干净安全不限速，平均速度比迅雷百度快）</li>
            </ul>
        </li>
        <li>
            <p>下载完就可以享受啦！</p>
        </li>
    </ol>
    <br>
    <h2>后续步骤</h2>
    <p class="warning">强烈建议之后赶紧把插件装上（不然没汉化也没法用Mod）。</p>
</body>

</html>
